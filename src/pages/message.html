<!DOCTYPE html>
<html lang="en" class="page-standalone">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>A Letter For You ✉</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@200;300;400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/splash.css">
  <link rel="stylesheet" href="../css/pages.css">
</head>
<body id="page-message" class="page-standalone">

  <button class="page-back" id="back-btn" aria-label="Go back">Back</button>

  <div class="page-header">
    <h2 class="page-title">A letter for you</h2>
    <p class="page-subtitle">From the heart ✦</p>
  </div>

  <div class="message-wrap">
    <div class="message-letter">
      <p data-typewrite="Mari,"></p>
      <p data-typewrite="Today is a special day — and I couldn't let it pass without telling you how much you mean to me."></p>
      <p data-typewrite="You're one of the most incredible people I've ever met. You have this energy that makes any room feel lighter, more fun, more alive."></p>
      <p data-typewrite="May this birthday be as special as you deserve. May it bring lots of joy, lots of laughter, and all the best things life has to offer."></p>
      <p data-typewrite="I wish you everything, Mari. Literally everything."></p>
      <p data-typewrite="Happy Birthday! 🎂"></p>
      <span class="message-letter__sign">
        <span data-typewrite="With love,"></span><br>
        <span data-typewrite="— Your slutty cousin"></span>
      </span>
      <span class="message-letter__heart" aria-hidden="true">♡</span>
    </div>
  </div>

  <script src="../js/message.js"></script>
</body>
</html>
